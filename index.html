<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC & DC Trip</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-active: #222536;
      --accent-nyc: #ff6b35;
      --accent-dc: #4a90d9;
      --text: #e8e8e8;
      --text-dim: #8b8fa3;
      --text-meal: #66d9a0;
      --text-action: #f0c040;
      --border: #2a2d3a;
      --tag-bg: rgba(255,107,53,0.15);
      --tag-dc-bg: rgba(74,144,217,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header h1 span.nyc { color: var(--accent-nyc); }
    .header h1 span.dc { color: var(--accent-dc); }

    .action-items-btn {
      background: rgba(240,192,64,0.15);
      color: var(--text-action);
      border: 1px solid rgba(240,192,64,0.3);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-items-btn:hover { background: rgba(240,192,64,0.25); }

    .day-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .day-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .day-tab.active {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }
    .day-tab.active.nyc { color: var(--accent-nyc); }
    .day-tab.active.dc { color: var(--accent-dc); }

    .day-tab .tab-date {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    .day-header {
      margin-bottom: 16px;
    }
    .day-header h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .day-header .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .city-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .city-tag.nyc { background: var(--tag-bg); color: var(--accent-nyc); }
    .city-tag.dc { background: var(--tag-dc-bg); color: var(--accent-dc); }
    .city-tag.travel { background: rgba(160,120,220,0.15); color: #b89ce0; }

    .timeline {
      position: relative;
      padding-left: 20px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    .event {
      position: relative;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .event:hover { background: var(--card-active); }

    .event::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--bg);
    }
    .event.meal::before { background: var(--text-meal); }
    .event.highlight::before { background: var(--accent-nyc); }
    .event.highlight-dc::before { background: var(--accent-dc); }

    .event-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 3px;
      font-variant-numeric: tabular-nums;
    }

    .event-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .event-detail {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.4;
    }

    .event-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      font-weight: 500;
    }
    .tag.meal { background: rgba(102,217,160,0.12); color: var(--text-meal); }
    .tag.transport { background: rgba(120,160,240,0.12); color: #8ab4f8; }
    .tag.activity { background: rgba(200,140,255,0.12); color: #c89cff; }
    .tag.reserved { background: rgba(255,107,53,0.12); color: var(--accent-nyc); }
    .tag.note { background: rgba(240,192,64,0.12); color: var(--text-action); }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8ab4f8;
      text-decoration: none;
      margin-top: 6px;
      padding: 3px 0;
    }
    .map-link:hover { text-decoration: underline; }
    .map-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-action);
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover { color: var(--text); }

    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.4;
    }
    .action-item:last-child { border-bottom: none; }
    .action-item input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--text-action);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .action-item label { cursor: pointer; }
    .action-item label.checked { text-decoration: line-through; color: var(--text-dim); }

    /* Now indicator */
    .now-indicator {
      display: none;
      position: relative;
      height: 2px;
      background: #ff4444;
      margin: 4px 0;
      border-radius: 1px;
    }
    .now-indicator::before {
      content: 'NOW';
      position: absolute;
      left: -18px;
      top: -7px;
      font-size: 9px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: 0.5px;
    }
    .now-indicator.visible { display: block; }

    .event.current {
      border-color: rgba(255,68,68,0.4);
      box-shadow: 0 0 0 1px rgba(255,68,68,0.15);
    }

    /* Trip countdown */
    .countdown {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      padding: 8px;
    }
    .countdown strong {
      color: var(--text);
    }

    @media (max-width: 420px) {
      .day-tab { padding: 6px 10px; font-size: 12px; }
      .event-title { font-size: 14px; }
      .content { padding: 12px; }
    }
  </style>
</head>

let currentDay = 0;

function init() {
  // Auto-select today's day if during the trip
  const today = new Date().toISOString().split('T')[0];
  const idx = DAYS.findIndex(d => d.fullDate === today);
  if (idx !== -1) currentDay = idx;

  renderTabs();
  renderDay();
  renderActionItems();
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = DAYS.map((d, i) => `
    <div class="day-tab ${i === currentDay ? 'active' : ''} ${d.city}" onclick="selectDay(${i})">
      ${d.label}
      <span class="tab-date">${d.date}</span>
    </div>
  `).join('');
}

function selectDay(i) {
  currentDay = i;
  renderTabs();
  renderDay();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function parseTime(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function getCurrentEventIndex(day) {
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  if (day.fullDate !== today) return -1;

  const currentMin = now.getHours() * 60 + now.getMinutes();
  let idx = -1;
  for (let i = 0; i < day.events.length; i++) {
    if (parseTime(day.events[i].time) <= currentMin) idx = i;
  }
  return idx;
}

      <h2>${day.title}</h2>
      <div class="subtitle">${day.subtitle}</div>
    </div>
    <div class="timeline">
  `;

  day.events.forEach((ev, i) => {
    const isCurrent = (i === currentIdx);
    const evClass = ev.type === 'meal' ? 'meal' :
                    ev.type === 'highlight' ? (day.city === 'dc' ? 'highlight-dc' : 'highlight') : '';

    html += `<div class="event ${evClass} ${isCurrent ? 'current' : ''}">`;
    html += `<div class="event-time">${ev.time}</div>`;
    html += `<div class="event-title">${ev.title}</div>`;

    if (ev.detail) {
      html += `<div class="event-detail">${ev.detail}</div>`;
    }

    // Tags
    const tags = [];
    if (ev.type === 'meal' && ev.meal) tags.push(`<span class="tag meal">Meal ${ev.meal}</span>`);
    if (ev.type === 'transport') tags.push(`<span class="tag transport">Transit</span>`);
    if (ev.type === 'activity') tags.push(`<span class="tag activity">Activity</span>`);
    if (ev.tags) {
      ev.tags.forEach(t => {
        if (t === 'reserved') tags.push(`<span class="tag reserved">Reserved</span>`);
        if (t === 'note') tags.push(`<span class="tag note">Check ahead</span>`);
      });
    }
    if (tags.length) html += `<div class="event-tags">${tags.join('')}</div>`;

    // Map link
    if (ev.loc) {
      html += `<a class="map-link" href="${mapUrl(ev.loc)}" target="_blank" rel="noopener">${MAP_ICON} Open in Maps</a>`;
    }

    html += `</div>`;
  });

  html += '</div>';

  // Countdown
  const tripStart = new Date('2026-03-14T00:00:00');
  const now = new Date();
  const diff = Math.ceil((tripStart - now) / (1000 * 60 * 60 * 24));
  if (diff > 0) {
    html += `<div class="countdown"><strong>${diff} day${diff !== 1 ? 's' : ''}</strong> until the trip</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderActionItems() {
  const saved = JSON.parse(localStorage.getItem('tripActions') || '{}');
  document.getElementById('actionItems').innerHTML = ACTION_ITEMS.map((item, i) => `
    <div class="action-item">
      <input type="checkbox" id="action${i}" ${saved[i] ? 'checked' : ''} onchange="toggleAction(${i})">
      <label for="action${i}" class="${saved[i] ? 'checked' : ''}">${item}</label>
    </div>
  `).join('');
}

function toggleAction(i) {
  const saved = JSON.parse(localStorage.getItem('tripActions') || '{}');
  saved[i] = !saved[i];
  localStorage.setItem('tripActions', JSON.stringify(saved));
  renderActionItems();
}

function toggleModal() {
  document.getElementById('modalOverlay').classList.toggle('open');
}

function closeModal(e) {
  if (e.target === e.currentTarget) toggleModal();
}

// Refresh current event indicator every minute
setInterval(() => {
  renderDay();
}, 60000);

init();
  </script>
</body>
</html>
