<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browns NYC & DC Trip</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NYC-DC Trip">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --card-active: #faf7f2;
      --accent-nyc: #d4522a;
      --accent-dc: #2a6cb6;
      --text: #1a1a1a;
      --text-dim: #6b6b6b;
      --text-meal: #1a8a52;
      --text-action: #b8860b;
      --border: #ddd5c8;
      --tag-bg: rgba(212,82,42,0.1);
      --tag-dc-bg: rgba(42,108,182,0.1);
      --header-bg: rgba(245,240,232,0.92);
      --link-color: #2a6cb6;
      --tag-transport-bg: rgba(42,108,182,0.1);
      --tag-activity-bg: rgba(120,80,180,0.1);
      --tag-activity-color: #7850b4;
      --tag-meal-bg: rgba(26,138,82,0.1);
      --tag-reserved-bg: rgba(212,82,42,0.1);
      --tag-note-bg: rgba(184,134,11,0.1);
      --tip-bg: rgba(42,108,182,0.05);
      --tip-border: rgba(42,108,182,0.3);
      --travel-bg: rgba(120,80,180,0.1);
      --travel-color: #7850b4;
      --action-btn-bg: rgba(184,134,11,0.15);
      --action-btn-border: rgba(184,134,11,0.3);
      --map-btn-border: rgba(42,108,182,0.25);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --card: #1a1d27;
        --card-active: #222536;
        --accent-nyc: #ff6b35;
        --accent-dc: #5a9fe6;
        --text: #e8e8e8;
        --text-dim: #8b8fa3;
        --text-meal: #66d9a0;
        --text-action: #f0c040;
        --border: #2a2d3a;
        --tag-bg: rgba(255,107,53,0.15);
        --tag-dc-bg: rgba(90,159,230,0.15);
        --header-bg: rgba(15,17,23,0.92);
        --link-color: #8ab4f8;
        --tag-transport-bg: rgba(90,159,230,0.12);
        --tag-activity-bg: rgba(200,140,255,0.12);
        --tag-activity-color: #c89cff;
        --tag-meal-bg: rgba(102,217,160,0.12);
        --tag-reserved-bg: rgba(255,107,53,0.12);
        --tag-note-bg: rgba(240,192,64,0.12);
        --tip-bg: rgba(90,159,230,0.08);
        --tip-border: rgba(90,159,230,0.3);
        --travel-bg: rgba(160,120,220,0.15);
        --travel-color: #b89ce0;
        --action-btn-bg: rgba(240,192,64,0.15);
        --action-btn-border: rgba(240,192,64,0.3);
        --map-btn-border: rgba(90,159,230,0.25);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header h1 span.nyc { color: var(--accent-nyc); }
    .header h1 span.dc { color: var(--accent-dc); }

    .header-buttons {
      display: flex;
      gap: 6px;
    }

    .header-btn {
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header-btn:hover { opacity: 0.85; }

    .action-items-btn {
      background: var(--action-btn-bg);
      color: var(--text-action);
      border: 1px solid var(--action-btn-border);
    }

    .travel-info-btn {
      background: var(--tag-transport-bg);
      color: var(--link-color);
      border: 1px solid var(--map-btn-border);
    }

    .day-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .day-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .day-tab.active {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }
    .day-tab.active.nyc { color: var(--accent-nyc); }
    .day-tab.active.dc { color: var(--accent-dc); }

    .day-tab .tab-date {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .content {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    .day-header {
      margin-bottom: 16px;
    }
    .day-header h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .day-header .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .city-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .city-tag.nyc { background: var(--tag-bg); color: var(--accent-nyc); }
    .city-tag.dc { background: var(--tag-dc-bg); color: var(--accent-dc); }
    .city-tag.travel { background: var(--travel-bg); color: var(--travel-color); }

    .timeline {
      position: relative;
      padding-left: 20px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    .event {
      position: relative;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .event:hover { background: var(--card-active); }

    .event::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--card);
    }
    .event.meal::before { background: var(--text-meal); }
    .event.highlight::before { background: var(--accent-nyc); }
    .event.highlight-dc::before { background: var(--accent-dc); }

    .event-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 3px;
      font-variant-numeric: tabular-nums;
    }

    .event-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .event-detail {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.4;
    }

    .event-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      font-weight: 500;
    }
    .tag.meal { background: var(--tag-meal-bg); color: var(--text-meal); }
    .tag.transport { background: var(--tag-transport-bg); color: var(--link-color); }
    .tag.activity { background: var(--tag-activity-bg); color: var(--tag-activity-color); }
    .tag.reserved { background: var(--tag-reserved-bg); color: var(--accent-nyc); }
    .tag.note { background: var(--tag-note-bg); color: var(--text-action); }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--link-color);
      text-decoration: none;
      margin-top: 6px;
      padding: 3px 0;
    }
    .map-link:hover { text-decoration: underline; }
    .map-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-action);
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover { color: var(--text); }

    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.4;
    }
    .action-item:last-child { border-bottom: none; }
    .action-item input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--text-action);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .action-item label { cursor: pointer; }
    .action-item label.checked { text-decoration: line-through; color: var(--text-dim); }

    /* Now indicator */
    .now-indicator {
      display: none;
      position: relative;
      height: 2px;
      background: #ff4444;
      margin: 4px 0;
      border-radius: 1px;
    }
    .now-indicator::before {
      content: 'NOW';
      position: absolute;
      left: -18px;
      top: -7px;
      font-size: 9px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: 0.5px;
    }
    .now-indicator.visible { display: block; }

    .event.current {
      border-color: rgba(255,68,68,0.4);
      box-shadow: 0 0 0 1px rgba(255,68,68,0.15);
    }

    /* Trip countdown */
    .countdown {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      padding: 8px;
    }
    .countdown strong {
      color: var(--text);
    }

    /* Navigation tips */
    .nav-tips {
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--tip-bg);
      border-radius: 6px;
      border-left: 3px solid var(--tip-border);
    }
    .nav-tip {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      padding: 2px 0;
    }
    .nav-tip::before {
      content: '\27A4';
      margin-right: 6px;
      font-size: 10px;
      color: var(--link-color);
    }

    /* Walking maps */
    .walk-map-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--link-color);
      background: none;
      border: 1px solid var(--map-btn-border);
      border-radius: 6px;
      padding: 4px 10px;
      margin-top: 8px;
      margin-left: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .walk-map-toggle:hover {
      opacity: 0.85;
    }
    .walk-map-toggle svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }
    .walk-map {
      display: none;
      margin-top: 8px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .walk-map.open { display: block; }
    .walk-map iframe {
      width: 100%;
      height: 250px;
      border: none;
      display: block;
    }

    /* Travel info cards */
    .travel-section { margin-bottom: 18px; }
    .travel-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .travel-card {
      background: var(--card-active);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .travel-card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .travel-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-dim);
    }
    .travel-row span { color: var(--text); font-weight: 500; }
    .travel-label { color: var(--text-dim); font-size: 11px; }
    .travel-route {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .travel-route .arrow { color: var(--text-dim); }
    .travel-detail {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .travel-detail strong { color: var(--text); font-weight: 600; }
    .confirm-num {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      background: var(--tip-bg);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--link-color);
    }

    /* Weather bar */
    .weather-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .weather-icon { font-size: 18px; }
    .weather-temps {
      font-weight: 600;
      color: var(--text);
    }
    .weather-temps .low { color: var(--text-dim); font-weight: 400; }
    .weather-rain {
      font-size: 11px;
      color: var(--link-color);
    }

    @media (max-width: 420px) {
      .day-tab { padding: 6px 10px; font-size: 12px; }
      .event-title { font-size: 14px; }
      .content { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>Browns <span class="nyc">NYC</span> & <span class="dc">DC</span> Trip</h1>
      <div class="header-buttons">
        <button class="header-btn travel-info-btn" onclick="toggleTravelModal()">Travel</button>
        <button class="header-btn action-items-btn" onclick="toggleModal()">Actions</button>
      </div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <div class="content" id="content"></div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="toggleModal()">&times;</button>
      <h3>Pre-Trip Action Items</h3>
      <div id="actionItems"></div>
    </div>
  </div>

  <div class="modal-overlay" id="travelModalOverlay" onclick="closeTravelModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="toggleTravelModal()">&times;</button>
      <h3 style="color: var(--link-color)">Travel Info</h3>
      <div id="travelInfo"></div>
    </div>
  </div>

  <script>
const MAP_ICON = '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';

function mapUrl(q) {
  return `https://maps.apple.com/?q=${encodeURIComponent(q)}`;
}

const DAYS = [
  {
    id: 'sat',

    title: 'Arrival & Midtown',

      { time: '11:58 AM', title: 'Land at JFK', detail: 'Delta 1411', type: 'transport', loc: 'JFK Airport, New York', tips: ['Follow signs to Ground Transportation on the arrivals level for taxi line.'] },
      { time: '1:30 PM', title: 'Taxi to Manhattan', detail: '~90 min with traffic', type: 'transport', tips: ['Request taxi to 485 5th Ave (Andaz hotel). Flat rate from JFK to Manhattan is around $70 + tolls/tip.', 'Route goes via Belt Pkwy → BQE → Manhattan Bridge or Hugh L. Carey Tunnel.'] },
      { time: '2:00 PM', title: 'Check in: Andaz 5th Avenue', detail: 'Drop bags, freshen up', type: 'highlight', loc: 'Andaz 5th Avenue, New York', tips: ['Hotel is at 485 5th Ave at 41st St, right by the NY Public Library.'] },
      { time: '2:15 PM', title: 'Lunch: Urban Hawker', detail: 'Singaporean street food', type: 'meal', meal: 1, loc: 'Urban Hawker, New York', tips: ['135 W 50th St — enter from 50th St between 6th and 7th Ave. Walk north on 5th Ave from hotel (~10 min).'] },
      { time: '3:30 PM', title: 'FAO Schwarz → Nike', detail: '0.3 miles apart', type: 'activity', loc: 'FAO Schwarz, New York', tips: ['FAO Schwarz is at 30 Rockefeller Plaza (49th St). Walk south on 5th Ave 4 blocks to Nike at 650 5th Ave (near 52nd).'], walkingMap: { q: 'FAO Schwarz, 30 Rockefeller Plaza, New York', z: 16 } },
      { time: '5:15 PM', title: 'Spyscape', detail: 'Game zones (~1 hour, reserved)', type: 'highlight', tags: ['reserved'], loc: 'Spyscape, New York', tips: ['928 8th Ave (between 54th & 55th). From Nike, walk west on 52nd St to 8th Ave, then north 2 blocks.'] },
      { time: '6:15 PM', title: 'Subway toward West Village', type: 'transport', tips: ['Take the C or E train from 50th St station (8th Ave) to West 4th St–Washington Sq. Exit at 6th Ave side.', "It's about 4 stops, ~12 min ride."] },
      { time: '7:00 PM', title: 'Dinner: Pizza Loves Emily', detail: 'West Village (reserved)', type: 'meal', meal: 2, tags: ['reserved'], loc: 'Pizza Loves Emily, West Village, New York', tips: ['169 W 10th St. From West 4th St station, walk west on W 4th St, turn right on 7th Ave S, left on W 10th (~5 min).'] }

  },
  {

    fullDate: '2026-03-15',
    title: 'Chinatown, Tribeca & Broadway',
    subtitle: 'East Village → Tribeca → Chinatown → Broadway',
    city: 'nyc',
    events: [
      { time: '8:30 AM', title: 'Breakfast: Justin\'s Salt Bread / Librae Bakery', detail: 'East Village', type: 'meal', meal: 1, loc: "Justin's Salt Bread, East Village, New York", tips: ["Justin's Salt Bread is at 179 E 3rd St. Librae Bakery is at 188 E 2nd St — they're one block apart.", 'From Andaz: take the 6 train from Grand Central to Astor Place (~10 min), then walk east.'] },

      { time: '10:00 AM', title: 'Walk north through Tribeca', detail: 'Harrison Street Row (1800s Federal townhouses), Arcade Bakery, Mysterious Bookshop', type: 'activity', loc: 'Harrison Street, Tribeca, New York', tips: ['Start at Harrison St & Greenwich St for the row houses. Arcade Bakery is at 220 Church St (look for the small alley entrance). Mysterious Bookshop at 58 Warren St.', 'Walk southeast — everything trends toward Canal St and Chinatown.'], walkingMap: { q: 'Harrison St and Greenwich St, Tribeca, New York', z: 15 } },

      { time: '12:30 PM', title: 'Chinatown Fair & Columbus Park', detail: 'Arcade + park hang', type: 'activity', loc: 'Chinatown Fair Family Fun Center, New York', tips: ['Chinatown Fair is at 8 Mott St (south of Canal). Columbus Park is 1 block east on Mulberry — good people-watching.'] },
      { time: '1:30 PM', title: 'Banksy Museum of Art', detail: 'Ticketed traveling exhibition — confirm location & hours', type: 'highlight', tags: ['note'], loc: 'Banksy Museum, New York', tips: ['Confirm exact address before going — this is a traveling exhibition that moves locations.'] },
      { time: '3:30 PM', title: 'Nom Wah Tea Parlor (walk-up)', detail: 'Arrive 3:30 to minimize wait. Budget 30–45 min on weekends. No reservations on weekends.', type: 'meal', meal: 2, tags: ['note'], loc: 'Nom Wah Tea Parlor, New York', tips: ['13 Doyers St — a tiny curved alley off Chatham Sq. Look for the red awning.', 'Put your name in, then browse Doyers St while waiting.'] },

let weatherData = {};

const WMO_CODES = {
  0: ['Clear', '\u2600\uFE0F'], 1: ['Mostly Clear', '\uD83C\uDF24\uFE0F'], 2: ['Partly Cloudy', '\u26C5'],
  3: ['Overcast', '\u2601\uFE0F'], 45: ['Fog', '\uD83C\uDF2B\uFE0F'], 48: ['Fog', '\uD83C\uDF2B\uFE0F'],
  51: ['Light Drizzle', '\uD83C\uDF26\uFE0F'], 53: ['Drizzle', '\uD83C\uDF26\uFE0F'], 55: ['Heavy Drizzle', '\uD83C\uDF26\uFE0F'],
  61: ['Light Rain', '\uD83C\uDF27\uFE0F'], 63: ['Rain', '\uD83C\uDF27\uFE0F'], 65: ['Heavy Rain', '\uD83C\uDF27\uFE0F'],
  71: ['Light Snow', '\uD83C\uDF28\uFE0F'], 73: ['Snow', '\uD83C\uDF28\uFE0F'], 75: ['Heavy Snow', '\uD83C\uDF28\uFE0F'],
  80: ['Light Showers', '\uD83C\uDF26\uFE0F'], 81: ['Showers', '\uD83C\uDF27\uFE0F'], 82: ['Heavy Showers', '\uD83C\uDF27\uFE0F'],
  95: ['Thunderstorm', '\u26C8\uFE0F'], 96: ['Thunderstorm', '\u26C8\uFE0F'], 99: ['Thunderstorm', '\u26C8\uFE0F']
};

async function fetchWeather() {
  const cities = [
    { name: 'nyc', lat: 40.7128, lon: -74.006, tz: 'America/New_York' },
    { name: 'dc', lat: 38.9072, lon: -77.0369, tz: 'America/New_York' }
  ];
  for (const city of cities) {
    try {
      const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}` +
        `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code` +
        `&temperature_unit=fahrenheit&timezone=${city.tz}&start_date=2026-03-14&end_date=2026-03-20`
      );
      const data = await res.json();
      if (data.daily) {
        data.daily.time.forEach((date, i) => {
          weatherData[date + '-' + city.name] = {
            high: Math.round(data.daily.temperature_2m_max[i]),
            low: Math.round(data.daily.temperature_2m_min[i]),
            rain: data.daily.precipitation_probability_max[i],
            code: data.daily.weather_code[i]
          };
        });
        renderDay(); // re-render with weather
      }
    } catch (e) { /* weather is optional */ }
  }
}

function getWeather(day) {
  const city = day.city === 'travel' ? 'nyc' : day.city;
  return weatherData[day.fullDate + '-' + city];
}

let currentDay = 0;

function init() {
  // Auto-select today's day if during the trip
  const today = new Date().toISOString().split('T')[0];
  const idx = DAYS.findIndex(d => d.fullDate === today);
  if (idx !== -1) currentDay = idx;

  renderTabs();
  renderDay();
  renderActionItems();
  renderTravelInfo();
  fetchWeather();
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = DAYS.map((d, i) => `
    <div class="day-tab ${i === currentDay ? 'active' : ''} ${d.city}" onclick="selectDay(${i})">
      ${d.label}
      <span class="tab-date">${d.date}</span>
    </div>
  `).join('');
}

function selectDay(i) {
  currentDay = i;
  renderTabs();
  renderDay();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function parseTime(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function getCurrentEventIndex(day) {
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  if (day.fullDate !== today) return -1;

  const currentMin = now.getHours() * 60 + now.getMinutes();
  let idx = -1;
  for (let i = 0; i < day.events.length; i++) {
    if (parseTime(day.events[i].time) <= currentMin) idx = i;
  }
  return idx;
}

function renderDay() {
  const day = DAYS[currentDay];
  const currentIdx = getCurrentEventIndex(day);
  const cityClass = day.city === 'travel' ? 'travel' : day.city;

  const weather = getWeather(day);
  let weatherHtml = '';
  if (weather) {
    const [desc, icon] = WMO_CODES[weather.code] || ['--', ''];
    weatherHtml = `<div class="weather-bar">
      <span class="weather-icon">${icon}</span>
      <span class="weather-temps">${weather.high}°<span class="low"> / ${weather.low}°F</span></span>
      <span>${desc}</span>
      ${weather.rain > 0 ? `<span class="weather-rain">${weather.rain}% rain</span>` : ''}
    </div>`;
  }

  let html = `
    <div class="day-header">
      <span class="city-tag ${cityClass}">${day.city === 'travel' ? 'NYC → DC' : day.city}</span>
      <h2>${day.title}</h2>
      <div class="subtitle">${day.subtitle}</div>
      ${weatherHtml}
    </div>
    <div class="timeline">
  `;

  day.events.forEach((ev, i) => {
    const isCurrent = (i === currentIdx);
    const evClass = ev.type === 'meal' ? 'meal' :
                    ev.type === 'highlight' ? (day.city === 'dc' ? 'highlight-dc' : 'highlight') : '';

    html += `<div class="event ${evClass} ${isCurrent ? 'current' : ''}">`;
    html += `<div class="event-time">${ev.time}</div>`;
    html += `<div class="event-title">${ev.title}</div>`;

    if (ev.detail) {
      html += `<div class="event-detail">${ev.detail}</div>`;
    }

    // Tags
    const tags = [];
    if (ev.type === 'meal' && ev.meal) tags.push(`<span class="tag meal">Meal ${ev.meal}</span>`);
    if (ev.type === 'transport') tags.push(`<span class="tag transport">Transit</span>`);
    if (ev.type === 'activity') tags.push(`<span class="tag activity">Activity</span>`);
    if (ev.tags) {
      ev.tags.forEach(t => {
        if (t === 'reserved') tags.push(`<span class="tag reserved">Reserved</span>`);
        if (t === 'note') tags.push(`<span class="tag note">Check ahead</span>`);
      });
    }
    if (tags.length) html += `<div class="event-tags">${tags.join('')}</div>`;

    // Navigation tips
    if (ev.tips && ev.tips.length) {
      html += `<div class="nav-tips">`;
      ev.tips.forEach(tip => {
        html += `<div class="nav-tip">${tip}</div>`;
      });
      html += `</div>`;
    }

    // Map link
    if (ev.loc) {
      html += `<a class="map-link" href="${mapUrl(ev.loc)}" target="_blank" rel="noopener">${MAP_ICON} Open in Maps</a>`;
    }

    // Walking map
    if (ev.walkingMap) {
      const mapId = `map-${currentDay}-${i}`;
      html += `<button class="walk-map-toggle" onclick="toggleMap('${mapId}')"><svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg> Show area map</button>`;
      html += `<div class="walk-map" id="${mapId}"><iframe loading="lazy" allowfullscreen src="https://maps.google.com/maps?q=${encodeURIComponent(ev.walkingMap.q)}&t=&z=${ev.walkingMap.z}&ie=UTF8&iwloc=&output=embed"></iframe></div>`;
    }

    html += `</div>`;
  });

  html += '</div>';

  // Countdown
  const tripStart = new Date('2026-03-14T00:00:00');
  const now = new Date();
  const diff = Math.ceil((tripStart - now) / (1000 * 60 * 60 * 24));
  if (diff > 0) {
    html += `<div class="countdown"><strong>${diff} day${diff !== 1 ? 's' : ''}</strong> until the trip</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderActionItems() {
  const saved = JSON.parse(localStorage.getItem('tripActions') || '{}');
  document.getElementById('actionItems').innerHTML = ACTION_ITEMS.map((item, i) => `
    <div class="action-item">
      <input type="checkbox" id="action${i}" ${saved[i] ? 'checked' : ''} onchange="toggleAction(${i})">
      <label for="action${i}" class="${saved[i] ? 'checked' : ''}">${item}</label>
    </div>
  `).join('');
}

function toggleAction(i) {
  const saved = JSON.parse(localStorage.getItem('tripActions') || '{}');
  saved[i] = !saved[i];
  localStorage.setItem('tripActions', JSON.stringify(saved));
  renderActionItems();
}

function toggleModal() {
  document.getElementById('modalOverlay').classList.toggle('open');
}

function closeModal(e) {
  if (e.target === e.currentTarget) toggleModal();
}

const MAP_TOGGLE_ICON = '<svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>';

function renderTravelInfo() {
  const t = TRAVEL_INFO;
  let html = '';

  // Flights
  html += '<div class="travel-section"><div class="travel-section-title">Flights</div>';
  t.flights.forEach(f => {
    html += `<div class="travel-card">
      <div class="travel-card-title">${f.airline}</div>
      <div class="travel-detail">${f.date} · ${f.duration}</div>
      <div class="travel-route">
        <strong>${f.depart.code}</strong> ${f.depart.time}
        <span class="arrow">→</span>
        <strong>${f.arrive.code}</strong> ${f.arrive.time}
      </div>
      <div class="travel-detail">${f.seats}</div>
      ${f.confirmation ? `<div class="travel-detail">Confirmation: <span class="confirm-num">${f.confirmation}</span></div>` : ''}
    </div>`;
  });
  html += '</div>';

  // Train
  html += '<div class="travel-section"><div class="travel-section-title">Train</div>';
  html += `<div class="travel-card">
    <div class="travel-card-title">${t.train.service}</div>
    <div class="travel-detail">${t.train.date} · ${t.train.class}</div>
    <div class="travel-route">
      <strong>NYP</strong> ${t.train.depart.time}
      <span class="arrow">→</span>
      <strong>WAS</strong> ${t.train.arrive.time}
    </div>
    <div class="travel-detail">${t.train.seats}</div>
    <div class="travel-detail">Confirmation: <span class="confirm-num">${t.train.confirmation}</span></div>
  </div></div>`;

  // Hotels
  html += '<div class="travel-section"><div class="travel-section-title">Hotels</div>';
  t.hotels.forEach(h => {
    html += `<div class="travel-card">
      <div class="travel-card-title">${h.name}</div>
      <div class="travel-detail">${h.dates}</div>
      <div class="travel-detail"><strong>${h.room}</strong></div>
      <div class="travel-detail">${h.address}</div>
      <div class="travel-detail"><a href="tel:${h.phone.replace(/-/g,'')}" style="color:var(--link-color);text-decoration:none">${h.phone}</a></div>
      <div class="travel-detail">Confirmation: <span class="confirm-num">${h.confirmation}</span></div>
    </div>`;
  });
  html += '</div>';

  document.getElementById('travelInfo').innerHTML = html;
}

function toggleTravelModal() {
  document.getElementById('travelModalOverlay').classList.toggle('open');
}

function closeTravelModal(e) {
  if (e.target === e.currentTarget) toggleTravelModal();
}

function toggleMap(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('open');
    const btn = el.previousElementSibling;
    if (btn) btn.innerHTML = MAP_TOGGLE_ICON + (el.classList.contains('open') ? ' Hide area map' : ' Show area map');
  }
}

// Refresh current event indicator every minute
setInterval(() => {
  renderDay();
}, 60000);

init();

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
  </script>
